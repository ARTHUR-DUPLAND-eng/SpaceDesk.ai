<!DOCTYPE html>
<html lang="fr">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>🚀 SpaceDesk</title>
<style>
*{margin:0;padding:0;box-sizing:border-box}
body{font-family:Arial,sans-serif;background:#0b1020;color:white}
.sidebar{position:fixed;left:0;top:0;width:220px;height:100vh;background:#111827;padding:20px}
.logo{color:cyan;font-size:28px;font-weight:bold;margin-bottom:30px}
.menu-item{background:#1e293b;padding:15px;margin-bottom:10px;border-radius:12px}
.main{margin-left:240px;padding:20px}
.header,.card,.notes{background:#111827;border-radius:15px;padding:20px}
.header{margin-bottom:20px}
.cards{display:grid;grid-template-columns:repeat(auto-fit,minmax(280px,1fr));gap:20px}
.card h2{color:cyan;margin-bottom:10px}
.notes{margin-top:20px}
textarea{width:100%;height:150px;background:#0f172a;color:white;border:none;border-radius:10px;padding:10px}
</style>
</head>
<body>
<div class="sidebar">
<div class="logo">🚀 SpaceDesk</div>
<div class="menu-item">🛰️ ISS</div>
<div class="menu-item">🌙 Lune</div>
<div class="menu-item">☀️ Soleil</div>
<div class="menu-item">🚀 Mission</div>
<div class="menu-item">📝 Notes</div>
</div>
<div class="main">
<div class="header">
<h1>🚀 Centre de Contrôle Spatial</h1>
<p>Bienvenue dans SpaceDesk</p>
</div>
<div class="cards">
<div class="card"><h2>🛰️ ISS</h2><p>Position de la station spatiale.</p></div>
<div class="card"><h2>🌙 Lune</h2><p>Informations lunaires.</p></div>
<div class="card"><h2>☀️ Soleil</h2><p>Informations solaires.</p></div>
<div class="card"><h2>🚀 Mission</h2><p>État général des systèmes.</p></div>
</div>
<div class="notes">
<h2>📝 Notes</h2>
<textarea placeholder="Écris tes notes ici..."></textarea>
</div>
</div>
</body>
</html>
